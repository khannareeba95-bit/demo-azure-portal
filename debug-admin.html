<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background: #d4edda; border-color: #c3e6cb; }
        .error { background: #f8d7da; border-color: #f5c6cb; }
        .loading { background: #fff3cd; border-color: #ffeaa7; }
        pre { background: #f8f9fa; padding: 10px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Admin Panel Debug Tool</h1>
    <div id="results"></div>

    <script>
        const API_BASE_URL = "https://jj5k0vv913.execute-api.ap-south-1.amazonaws.com/prod";
        const results = document.getElementById('results');

        function addResult(title, status, message, data = null) {
            const div = document.createElement('div');
            div.className = `test ${status}`;
            div.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                ${data ? `<pre>${JSON.stringify(data, null, 2)}</pre>` : ''}
            `;
            results.appendChild(div);
        }

        async function testAPI() {
            addResult('API Test', 'loading', 'Testing API connection...');

            try {
                
                const response = await fetch(`${API_BASE_URL}/admin/projects`, {
                    method: "GET",
                    headers: { "Content-Type": "application/json" }
                });


                if (response.ok) {
                    const data = await response.json();
                    
                    addResult('API Connection', 'success', 
                        `API is working! Status: ${response.status}`, 
                        { 
                            status: response.status,
                            projectCount: data.projects?.length || 0,
                            sampleProject: data.projects?.[0] || null
                        }
                    );

                    if (!data.projects || data.projects.length === 0) {
                        addResult('Data Issue', 'error', 
                            'API returns no projects - this is why admin panel shows loading'
                        );
                    }
                } else {
                    const errorText = await response.text();
                    addResult('API Error', 'error', 
                        `API Error: ${response.status} - ${errorText}`, 
                        { status: response.status, error: errorText }
                    );
                }
            } catch (error) {
                console.error('API Test Error:', error);
                addResult('Network Error', 'error', 
                    `Network Error: ${error.message}`, 
                    { error: error.message, stack: error.stack }
                );
            }
        }

        function testLocalStorage() {
            const currentPage = localStorage.getItem('currentPage');
            addResult('Local Storage', 'success', 
                `Current page: ${currentPage || 'not set'}`, 
                { currentPage }
            );
        }

        function testConsoleErrors() {
            const originalError = console.error;
            const errors = [];
            
            console.error = function(...args) {
                errors.push(args.join(' '));
                originalError.apply(console, args);
            };

            setTimeout(() => {
                if (errors.length > 0) {
                    addResult('Console Errors', 'error', 
                        `Found ${errors.length} console errors`, 
                        errors
                    );
                } else {
                    addResult('Console Errors', 'success', 'No console errors detected');
                }
            }, 2000);
        }

        // Run tests
        testLocalStorage();
        testConsoleErrors();
        testAPI();
    </script>
</body>
</html>
